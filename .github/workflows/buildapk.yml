name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'customer or rider (leave empty for both)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [customer, rider]
    env:
      # Two APK entry points: customer app targets goride-web, rider APK
      # points at goride-captain. Both call the same Worker.
      APP_ID: ${{ matrix.target == 'rider' && 'in.goride.captain' || 'in.goride.app' }}
      APP_NAME: ${{ matrix.target == 'rider' && 'GoRide Captain' || 'GoRide' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      # Capacitor 6 targets AGP 8.x + Gradle 8.x which need Java 21.
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }

      # Ensure Android SDK components exist + licenses accepted.
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Install deps
        run: npm ci

      # ------------- Detect Worker URL (same as deploy.yml) -------------
      - name: Resolve Worker URL
        id: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          SUB=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | node -e 'let s=""; process.stdin.on("data",d=>s+=d).on("end",()=>{ try{const j=JSON.parse(s); process.stdout.write(j.result?.subdomain||"")}catch{process.stdout.write("")} })' || echo "")
          if [ -n "$SUB" ]; then
            URL="https://goride-api.$SUB.workers.dev"
          else
            URL=""
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Worker URL: ${URL:-'(unset — using fallback)'}"

      - name: Build web (${{ matrix.target }})
        working-directory: apps/web
        env:
          VITE_APP_TARGET:        ${{ matrix.target }}
          VITE_SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_URL:           ${{ steps.worker.outputs.url }}
          VITE_MAP_TILES_URL:     https://tiles.openfreemap.org/styles/liberty
          VITE_DEFAULT_CITY:      Hyderabad
          VITE_DEFAULT_LAT:       "17.3850"
          VITE_DEFAULT_LNG:       "78.4867"
        run: npm run build

      # ------------- Capacitor + Android permissions -------------
      - name: Initialize Capacitor Android project
        working-directory: apps/web
        env:
          VITE_APP_TARGET: ${{ matrix.target }}
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Inject AndroidManifest permissions
        working-directory: apps/web/android/app/src/main
        env:
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          python3 - "$MATRIX_TARGET" <<'PY'
          import re, sys, pathlib
          target = sys.argv[1]
          p = pathlib.Path("AndroidManifest.xml")
          s = p.read_text()
          perms = [
              "android.permission.INTERNET",
              "android.permission.ACCESS_NETWORK_STATE",
              "android.permission.ACCESS_COARSE_LOCATION",
              "android.permission.ACCESS_FINE_LOCATION",
              "android.permission.FOREGROUND_SERVICE",
              "android.permission.FOREGROUND_SERVICE_LOCATION",
              "android.permission.POST_NOTIFICATIONS",
              "android.permission.VIBRATE",
              "android.permission.WAKE_LOCK",
              "android.permission.CAMERA",
              "android.permission.READ_MEDIA_IMAGES",
          ]
          if target == "rider":
              perms.insert(4, "android.permission.ACCESS_BACKGROUND_LOCATION")
          existing = re.findall(r'<uses-permission android:name="([^"]+)"', s)
          new = [n for n in perms if n not in existing]
          if new:
              lines = "\n    ".join(f'<uses-permission android:name="{n}"/>' for n in new)
              s = re.sub(r"(<manifest[^>]*>)", r"\1\n    " + lines, s, count=1)
              p.write_text(s)
              print(f"Added {len(new)} permission(s)")
          else:
              print("All permissions already present")
          PY

      # ------------- Build APK: signed if keystore secret exists, else unsigned debug -------------
      - name: Check for signing keystore
        id: keystore
        env:
          B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$B64" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
            echo "🔐 Keystore secret found — will produce signed release APK"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  No ANDROID_KEYSTORE_B64 secret — will produce UNSIGNED debug APK"
            echo "    Fine for sideload testing; add the secret before publishing to Play Store."
          fi

      - name: Decode keystore
        if: steps.keystore.outputs.have == 'true'
        working-directory: apps/web/android
        env:
          B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: printf "%s" "$B64" | base64 -d > app/release.keystore

      - name: Build signed release APK
        if: steps.keystore.outputs.have == 'true'
        working-directory: apps/web/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Build unsigned debug APK
        if: steps.keystore.outputs.have != 'true'
        working-directory: apps/web/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Locate + rename APK
        id: apk
        working-directory: apps/web/android
        run: |
          set -e
          if [ "${{ steps.keystore.outputs.have }}" = "true" ]; then
            SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
            DEST="goride-${{ matrix.target }}.apk"
          else
            SRC=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
            DEST="goride-${{ matrix.target }}-debug.apk"
          fi
          cp "$SRC" "$DEST"
          ls -la "$DEST"
          echo "path=apps/web/android/$DEST" >> "$GITHUB_OUTPUT"
          echo "name=$DEST" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/') && steps.keystore.outputs.have == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}

      - name: Summary
        run: |
          echo "### APK build — ${{ matrix.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Type: ${{ steps.keystore.outputs.have == 'true' && '✅ signed release' || '⚠️ unsigned debug (sideload only)' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- File: \`${{ steps.apk.outputs.name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker: \`${{ steps.worker.outputs.url || '(unset)' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download from the 'Artifacts' section of this run" >> "$GITHUB_STEP_SUMMARY"
