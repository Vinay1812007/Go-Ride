name: Apply Supabase migrations

# Runs SQL files against your Supabase project's Postgres.
# Trigger manually — Actions tab → "Apply Supabase migrations" → Run workflow.
# Uses SUPABASE_DB_URL secret (Postgres connection string, session pooler or direct).
# Idempotent for CREATE statements guarded by IF NOT EXISTS; the enums and
# triggers use CREATE OR REPLACE / DO blocks so re-runs are safe.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which files to apply'
        required: true
        default: 'all'
        type: choice
        options:
          - all              # 0001 + 0002 + 0003 + 0004 + seed
          - schema-only      # 0001
          - rls-only         # 0002
          - partner-orders   # 0003
          - scheduled-rides  # 0004
          - seed-only        # seed.sql

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Apply migrations
        env:
          PGCONN: ${{ secrets.SUPABASE_DB_URL }}
          TARGET: ${{ inputs.target }}
        run: |
          set -e
          if [ -z "$PGCONN" ]; then
            echo "❌ SUPABASE_DB_URL secret is not set."
            echo "   Get it from Supabase → Project Settings → Database →"
            echo "   Connection string → 'URI' (Session pooler is fine)."
            exit 1
          fi
          run_sql() {
            echo "───── applying $1 ─────"
            psql "$PGCONN" -v ON_ERROR_STOP=1 -f "$1"
            echo "✓ $1"
          }
          case "$TARGET" in
            all)
              run_sql supabase/migrations/0001_init.sql
              run_sql supabase/migrations/0002_rls.sql
              run_sql supabase/migrations/0003_partner_orders.sql
              run_sql supabase/migrations/0004_scheduled_rides.sql
              run_sql supabase/seed.sql
              ;;
            schema-only)     run_sql supabase/migrations/0001_init.sql ;;
            rls-only)        run_sql supabase/migrations/0002_rls.sql ;;
            partner-orders)  run_sql supabase/migrations/0003_partner_orders.sql ;;
            scheduled-rides) run_sql supabase/migrations/0004_scheduled_rides.sql ;;
            seed-only)       run_sql supabase/seed.sql ;;
          esac

      - name: Verify
        env:
          PGCONN: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$PGCONN" -v ON_ERROR_STOP=1 -c "\
            select 'tables' as kind, count(*) from information_schema.tables where table_schema='public' \
            union all select 'rate_cards seeded', count(*) from public.rate_cards \
            union all select 'service_areas seeded', count(*) from public.service_areas;"
