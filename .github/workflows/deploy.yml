name: Deploy web + api

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------- Cloudflare Worker (api) --------------------
  api:
    runs-on: ubuntu-latest
    outputs:
      worker_url: ${{ steps.worker.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - name: Install root deps
        run: npm ci

      - name: Provision KV namespace (idempotent) and patch wrangler.toml
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          API="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces"

          # 1. Look up existing namespace via CF REST (unambiguous JSON)
          LIST_JSON=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "$API?per_page=100")
          ID=$(printf '%s' "$LIST_JSON" | node -e '
            let s=""; process.stdin.on("data",d=>s+=d).on("end",()=>{
              try {
                const j = JSON.parse(s);
                const hit = (j.result||[]).find(n => n.title === "goride-api-CACHE");
                process.stdout.write(hit ? hit.id : "");
              } catch (e) { console.error("parse error:", e.message); process.exit(2); }
            })')

          # 2. Create if missing
          if [ -z "$ID" ]; then
            CREATE_JSON=$(curl -sS -X POST -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"title":"goride-api-CACHE"}' "$API")
            ID=$(printf '%s' "$CREATE_JSON" | node -e '
              let s=""; process.stdin.on("data",d=>s+=d).on("end",()=>{
                const j = JSON.parse(s);
                if (!j.success) { console.error("create failed:", JSON.stringify(j.errors)); process.exit(3); }
                process.stdout.write(j.result.id);
              })')
          fi

          if [ -z "$ID" ]; then echo "❌ Could not resolve KV namespace id"; exit 1; fi
          echo "✅ KV namespace id: $ID"

          # 3. Patch wrangler.toml in place
          sed -i "s/REPLACE_WITH_KV_ID/$ID/g" wrangler.toml
          grep -A1 '\[\[kv_namespaces\]\]' wrangler.toml

      - name: Push Worker secrets
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN:      ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:     ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET:       ${{ secrets.SUPABASE_JWT_SECRET }}
          SHARE_TOKEN_SECRET:        ${{ secrets.SHARE_TOKEN_SECRET }}
          ORS_KEY:                   ${{ secrets.ORS_KEY }}
          GEOCODER_KEY:              ${{ secrets.GEOCODER_KEY }}
        run: |
          set -e
          push() {
            local NAME=$1; local VAL=$2
            if [ -n "$VAL" ]; then
              printf "%s" "$VAL" | npx wrangler secret put "$NAME"
            else
              echo "↷ skipping empty $NAME"
            fi
          }
          push SUPABASE_URL              "$SUPABASE_URL"
          push SUPABASE_ANON_KEY         "$SUPABASE_ANON_KEY"
          push SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY"
          push SUPABASE_JWT_SECRET       "$SUPABASE_JWT_SECRET"
          push SHARE_TOKEN_SECRET        "$SHARE_TOKEN_SECRET"
          push ORS_KEY                   "$ORS_KEY"
          push GEOCODER_KEY              "$GEOCODER_KEY"

      - name: Deploy Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Resolve workers.dev URL
        id: worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          SUB=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | node -e 'let s=""; process.stdin.on("data",d=>s+=d).on("end",()=>{ const j=JSON.parse(s); process.stdout.write(j.result?.subdomain||""); })')
          if [ -z "$SUB" ]; then echo "❌ Could not resolve workers.dev subdomain"; exit 1; fi
          URL="https://goride-api.$SUB.workers.dev"
          echo "✅ Worker: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  # -------------------- Cloudflare Pages (web) --------------------
  web:
    needs: api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - name: Install
        run: npm ci

      - name: Build web
        working-directory: apps/web
        env:
          VITE_SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_URL:           ${{ needs.api.outputs.worker_url }}
          VITE_APP_TARGET:        customer
          VITE_MAP_TILES_URL:     https://tiles.openfreemap.org/styles/liberty
          VITE_DEFAULT_CITY:      Hyderabad
          VITE_DEFAULT_LAT:       "17.3850"
          VITE_DEFAULT_LNG:       "78.4867"
        run: npm run build

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          # Create if not exists (ignore "already exists" errors)
          npx wrangler pages project create goride-web --production-branch main 2>&1 | tee /tmp/pages.log \
            || grep -q "already exists\|already been created" /tmp/pages.log

      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist \
            --project-name=goride-web \
            --branch=main \
            --commit-hash=${{ github.sha }} \
            --commit-message="${{ github.event.head_commit.message }}"

      - name: Print URLs
        run: |
          echo "🚀 Worker: ${{ needs.api.outputs.worker_url }}"
          echo "🚀 Pages:  https://goride-web.pages.dev"
