name: E2E smoke

# Manual dispatch only. See tests/README.md for rationale.
on:
  workflow_dispatch:
    inputs:
      customer_url:
        description: 'Override customer Pages URL (blank = production)'
        required: false
        type: string
      captain_url:
        description: 'Override captain Pages URL (blank = production)'
        required: false
        type: string
      admin_url:
        description: 'Override admin Pages URL (blank = production)'
        required: false
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: tests }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm', cache-dependency-path: 'tests/package.json' }

      - name: Install
        run: npm install

      - name: Install Playwright chromium
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        env:
          GORIDE_URL_CUSTOMER: ${{ inputs.customer_url }}
          GORIDE_URL_CAPTAIN:  ${{ inputs.captain_url }}
          GORIDE_URL_ADMIN:    ${{ inputs.admin_url }}
          GORIDE_E2E_CUSTOMER_EMAIL:    ${{ secrets.GORIDE_E2E_CUSTOMER_EMAIL }}
          GORIDE_E2E_CUSTOMER_PASSWORD: ${{ secrets.GORIDE_E2E_CUSTOMER_PASSWORD }}
        run: npm test

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7
